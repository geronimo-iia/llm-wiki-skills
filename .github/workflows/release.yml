name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Extract release notes
        run: python3 .github/scripts/extract_changelog.py "${{ github.ref_name }}" > release_notes.md

      - uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
